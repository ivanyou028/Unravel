<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Threads Voice Test — STT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 560px;
      width: 100%;
      padding: 40px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }
    .status {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
    }
    .status.idle { background: #1a1a2e; color: #666; }
    .status.connecting { background: #2e2a1a; color: #f0c040; }
    .status.connected { background: #1a2e1a; color: #4caf50; }
    .status.error { background: #2e1a1a; color: #f44336; }
    .buttons { display: flex; justify-content: center; gap: 12px; margin-bottom: 32px; }
    button {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #startBtn { background: #4caf50; color: #fff; }
    #stopBtn { background: #f44336; color: #fff; }
    .transcript-box {
      text-align: left;
      background: #111;
      border-radius: 8px;
      padding: 20px;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 16px;
      line-height: 1.6;
      color: #ccc;
    }
    .transcript-box .final { color: #fff; }
    .transcript-box .interim { color: #666; font-style: italic; }
    .transcript-box .separator {
      border-top: 1px solid #222;
      margin: 8px 0;
    }
    .log {
      margin-top: 24px;
      text-align: left;
      background: #111;
      border-radius: 8px;
      padding: 12px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      max-height: 140px;
      overflow-y: auto;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Threads Voice Test</h1>
    <p class="subtitle">Deepgram real-time speech-to-text</p>
    <div id="status" class="status idle">idle</div>
    <br><br>
    <div class="buttons">
      <button id="startBtn" onclick="start()">Start Session</button>
      <button id="stopBtn" onclick="stop()" disabled>Stop Session</button>
    </div>
    <div id="transcript" class="transcript-box">
      <span class="interim">Your speech will appear here...</span>
    </div>
    <div id="log" class="log"></div>
  </div>

  <script>
    let ws = null;
    let mediaRecorder = null;
    let stream = null;
    let isSessionActive = false;

    // Track finalized transcript segments
    let finalSegments = [];
    let currentInterim = '';

    // 2s Claude decision loop state
    let decisionIntervalId = null;
    let lastProcessedIndex = 0;
    let decisionInFlight = false;

    function log(msg) {
      const el = document.getElementById('log');
      el.textContent += `${new Date().toLocaleTimeString()} — ${msg}\n`;
      el.scrollTop = el.scrollHeight;
    }

    function setStatus(text, cls) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = `status ${cls}`;
    }

    function setSessionButtons(isActive) {
      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      startBtn.disabled = isActive;
      stopBtn.disabled = !isActive;
      startBtn.textContent = isActive ? 'Session Live' : 'Start Session';
    }

    function renderTranscript() {
      const el = document.getElementById('transcript');
      let html = '';
      for (const seg of finalSegments) {
        html += `<span class="final">${seg}</span> `;
      }
      if (currentInterim) {
        html += `<span class="interim">${currentInterim}</span>`;
      }
      if (!html) {
        html = '<span class="interim">Listening...</span>';
      }
      el.innerHTML = html;
      el.scrollTop = el.scrollHeight;
    }

    async function requestNodeDecision(newText, fullTranscript) {
      const response = await fetch('/api/claude/decide', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ newText, fullTranscript }),
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || 'Failed to get node decision');
      }
      return payload;
    }

    async function dispatchGraphEvent(node) {
      const event = {
        type: 'UPSERT_NODE',
        node: {
          id: `node-${Date.now()}`,
          title: node.title,
          summary: node.summary,
          source: node.source || 'claude',
        },
      };

      const response = await fetch('/api/graph/event', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(event),
      });

      if (!response.ok) {
        throw new Error('Failed to dispatch graph event');
      }

      log(`[node] ${event.node.title}`);
    }

    function stopDecisionLoop() {
      if (decisionIntervalId) {
        clearInterval(decisionIntervalId);
        decisionIntervalId = null;
        log('Claude decision loop stopped');
      }
      decisionInFlight = false;
    }

    function startDecisionLoop() {
      stopDecisionLoop();

      decisionIntervalId = setInterval(async () => {
        if (decisionInFlight) {
          return;
        }

        const newSegments = finalSegments.slice(lastProcessedIndex);
        const newText = newSegments.join(' ').trim();

        if (!newText) {
          return;
        }

        decisionInFlight = true;
        try {
          const fullTranscript = finalSegments.join(' ').trim();
          const decision = await requestNodeDecision(newText, fullTranscript);

          if (decision?.shouldAddNode && decision?.node) {
            await dispatchGraphEvent(decision.node);
          }

          lastProcessedIndex = finalSegments.length;
        } catch (err) {
          log(`[claude-error] ${err.message}`);
        } finally {
          decisionInFlight = false;
        }
      }, 2000);

      log('Claude decision loop started (every 2s)');
    }

    function cleanupSession(options = {}) {
      const { closeSocket = true } = options;
      stopDecisionLoop();

      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      mediaRecorder = null;

      if (stream) {
        stream.getTracks().forEach((t) => t.stop());
      }
      stream = null;

      if (closeSocket && ws) {
        ws.close();
      }
      if (closeSocket) {
        ws = null;
      }
    }

    function stop() {
      if (!isSessionActive) {
        return;
      }

      log('Stopping session...');
      cleanupSession();
      isSessionActive = false;
      setStatus('idle', 'idle');
      setSessionButtons(false);
    }

    async function start() {
      if (isSessionActive) {
        return;
      }

      isSessionActive = true;
      setSessionButtons(true);
      setStatus('connecting...', 'connecting');
      finalSegments = [];
      currentInterim = '';
      lastProcessedIndex = 0;
      decisionInFlight = false;
      renderTranscript();

      try {
        // 1. Get mic access
        log('Requesting microphone...');
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        log('Microphone granted');

        // 2. Connect WebSocket to our server
        const wsUrl = `ws://${location.host}/ws/transcribe`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          log('WebSocket connected to server');
          setStatus('connected — speak!', 'connected');

          // 3. Start MediaRecorder and stream audio chunks
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
              ws.send(e.data);
            }
          };
          mediaRecorder.start(100); // send chunks every 100ms
          log('Recording started — speak now');
          startDecisionLoop();
        };

        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'transcript') {
            if (msg.is_final) {
              finalSegments.push(msg.transcript);
              currentInterim = '';
              log(`[final] ${msg.transcript}`);
            } else {
              currentInterim = msg.transcript;
            }
            renderTranscript();
          } else if (msg.type === 'utterance_end') {
            // Visual separator between utterances could go here
          } else if (msg.type === 'status') {
            log(`[status] ${msg.message}`);
          } else if (msg.type === 'error') {
            log(`[error] ${msg.message}`);
            setStatus('deepgram error', 'error');
          }
        };

        ws.onclose = () => {
          log('WebSocket closed');
          cleanupSession({ closeSocket: false });
          ws = null;
          isSessionActive = false;
          setStatus('disconnected', 'idle');
          setSessionButtons(false);
        };

        ws.onerror = () => {
          log('WebSocket error');
          setStatus('error', 'error');
        };
      } catch (err) {
        log(`Error: ${err.message}`);
        cleanupSession();
        isSessionActive = false;
        setStatus('error', 'error');
        setSessionButtons(false);
      }
    }

    window.addEventListener('beforeunload', () => {
      cleanupSession();
    });
  </script>
</body>
</html>
